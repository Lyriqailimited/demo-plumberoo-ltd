<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <!-- ============================================
       CONFIGURATION - EDIT THESE VALUES
       ============================================ -->
  <script>
    const CONFIG = {
      // ========== BACKEND SETTINGS ==========
      BACKEND_URL: "https://widget.numbero.org",

      ASSISTANT_ID: "assistant_plumbing_plumberoo_ltd_1775132345",

      // ========== BRANDING - TEXT ==========
      PAGE_TITLE: "Plumberoo AI Widget",
      BADGE_TEXT: "Plumberoo",
      TITLE: "Talk to Plumberoo's AI Receptionist",
      SUBTITLE: "24/7 AI answers for all your plumbing questions in London SW11",

      // Button text
      START_BUTTON_TEXT: "Request Plumber",
      END_BUTTON_TEXT: "End Call",

      // Status messages
      STATUS_READY: "Ready to connect",
      STATUS_CONNECTED: "Plumber connected",

      // Transcript messages
      GREETING_TEXT: "Hi, I'm Plumbers AI. What plumbing issue can I help with today?",
      CONNECTING_TEXT: "Connecting to a plumber...",
      CONNECTED_TEXT: "Connected. Describe the problem.",
      AGENT_READY_TEXT: "Plumber is ready.",
      DISCONNECTED_TEXT: "Call ended",
      CONNECTION_FAILED_TEXT: "Connection failed. Please try again.",

      // ========== BRANDING - COLORS ==========
      PRIMARY_COLOR: "#0d56ab",        // Plumberoo blue - primary brand color
      ACCENT_COLOR: "#fee25f",         // Plumberoo yellow - buttons and accents
      ACCENT_COLOR_HOVER: "#e6c93e",   // Hover state for buttons
      END_BUTTON_COLOR: "#ef4444",     // Red - end call button / urgent
      END_BUTTON_HOVER: "#dc2626",     // Darker red - end button hover
      TEXT_COLOR: "#ffffff",           // Main text color (white for dark theme)
      SUBTITLE_COLOR: "#94a3b8",       // Subtitle text color (light gray)
      SUCCESS_COLOR: "#22c55e",        // Green - connected status
    };
  </script>


  <!-- ============================================ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice AI Widget</title>

  <style>
    :root {
      --primary-color: #a855f7;
      --accent-color: #f59e0b;
      --accent-color-hover: #d97706;
      --end-button-color: #ef4444;
      --end-button-hover: #dc2626;
      --text-color: #ffffff;
      --subtitle-color: #94a3b8;
      --success-color: #22c55e;
      --bg-dark: #0a1628;
      --card-bg: #0e1e38;
      --card-border: rgba(255, 255, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .widget-container {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      position: relative;
    }

    .gradient-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(30, 58, 110, 0.5) 0%, transparent 60%);
      z-index: 0;
    }

    .header {
      position: relative;
      z-index: 10;
      padding: 32px 32px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 12px;
      background: transparent;
      border: none;
      margin-bottom: 24px;
    }

    .badge svg {
      width: 14px;
      height: 14px;
      color: var(--primary-color);
    }

    .badge span {
      font-size: 12px;
      font-weight: 500;
      color: color-mix(in srgb, var(--primary-color) 80%, black);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-logo {
      height: 60px;
      width: auto;
      object-fit: contain;
    }

    .title {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-color);
      line-height: 1.2;
      margin-bottom: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .subtitle {
      color: var(--subtitle-color);
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 400px;
    }

    .visualizer-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      padding: 32px;
      position: relative;
      z-index: 10;
    }

    .pulsing-circle-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ripple {
      position: absolute;
      inset: 0;
      background: color-mix(in srgb, var(--primary-color) 20%, transparent);
      border-radius: 50%;
      opacity: 0;
      transform: scale(1);
    }

    .ripple.active {
      animation: ripple-animation 2s ease-out infinite;
    }

    .ripple.active.delayed {
      animation-delay: 0.5s;
    }

    @keyframes ripple-animation {
      0% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.4; }
      100% { opacity: 0; transform: scale(2); }
    }

    .ripple.delayed.active {
      animation: ripple-animation-small 2s ease-out infinite;
      animation-delay: 0.5s;
    }

    @keyframes ripple-animation-small {
      0% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.4; }
      100% { opacity: 0; transform: scale(1.5); }
    }

    .core-circle {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
      box-shadow: 0 0 30px 8px rgba(168, 85, 247, 0.3);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .core-circle.active {
      animation: pulse-circle 1.5s ease-in-out infinite;
      box-shadow: 0 0 50px 15px rgba(168, 85, 247, 0.5);
    }

    @keyframes pulse-circle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .visualizer-bars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 48px;
    }

    .bar {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 9999px;
      opacity: 0.9;
      transition: height 0.3s ease;
    }

    .bar.active { animation: bar-animation 0.6s ease-in-out infinite alternate; }
    .bar:nth-child(1).active { animation-delay: 0.1s; }
    .bar:nth-child(2).active { animation-delay: 0.2s; }
    .bar:nth-child(3).active { animation-delay: 0.3s; }
    .bar:nth-child(4).active { animation-delay: 0.4s; }
    .bar:nth-child(5).active { animation-delay: 0.5s; }

    @keyframes bar-animation {
      0% { height: 10px; }
      100% { height: 32px; }
    }

    .status-badge {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 6px 16px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .status-badge.disconnected {
      background: rgba(255, 255, 255, 0.05);
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-badge.connected {
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.disconnected { background: #94a3b8; }
    .status-dot.connected {
      background: var(--success-color);
      animation: pulse-dot 1s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .action-area {
      padding: 32px;
      position: relative;
      z-index: 10;
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid var(--card-border);
      backdrop-filter: blur(10px);
    }

    .transcript-area {
      text-align: center;
      margin-bottom: 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    .transcript-text {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--text-color);
      transition: opacity 0.3s ease;
    }

    .call-button {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .call-button:hover {
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
      transform: translateY(-1px);
    }

    .call-button:active { transform: scale(0.98); }

    .call-button.start {
      background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
      color: white;
    }

    .call-button.start:hover {
      background: linear-gradient(135deg, #d97706 0%, #ea580c 100%);
    }

    .call-button.end { background: var(--end-button-color); color: white; }
    .call-button.end:hover { background: var(--end-button-hover); }
    .call-button svg { width: 20px; height: 20px; }

    .error-message {
      margin-top: 16px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 12px;
      color: #f87171;
      font-size: 14px;
      text-align: center;
    }

    #audioOutput { display: none; }
  </style>
</head>

<body>
  <audio id="audioOutput" autoplay></audio>

  <div class="widget-container">
    <div class="gradient-bg"></div>

    <div class="header">
      <div class="badge">
        <img src="https://plumberoo.co.uk/wp-content/uploads/2023/05/plumberoo.png" alt="Plumberoo" class="badge-logo">
      </div>
      <h1 class="title">Talk to us.</h1>
      <p class="subtitle">Experience the future of voice AI. Click the button below to start a conversation.</p>
    </div>

    <div class="visualizer-area">
      <div class="pulsing-circle-container">
        <div class="ripple" id="ripple1"></div>
        <div class="ripple delayed" id="ripple2"></div>
        <div class="core-circle" id="coreCircle">
          <div class="visualizer-bars">
            <div class="bar" id="bar1"></div>
            <div class="bar" id="bar2"></div>
            <div class="bar" id="bar3"></div>
            <div class="bar" id="bar4"></div>
            <div class="bar" id="bar5"></div>
          </div>
        </div>
        <div class="status-badge disconnected" id="statusBadge">
          <div class="status-dot disconnected" id="statusDot"></div>
          <span id="statusText">Ready to connect</span>
        </div>
      </div>
    </div>

    <div class="action-area">
      <div class="transcript-area">
        <p class="transcript-text" id="transcriptText">Hi, how can I help you today?</p>
      </div>

      <button class="call-button start" id="callButton" onclick="toggleCall()">
        <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" x2="12" y1="19" y2="22" />
        </svg>
        <svg id="phoneIcon" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
        </svg>
        <span id="buttonText">Start Conversation</span>
      </button>

      <div class="error-message" id="errorMessage" style="display: none;"></div>
    </div>
  </div>

  <script src="https://raw.githubusercontent.com/Lyriqailimited/bpoai-widget-static/main/widget-bundle.js"></script>

  <script>
    const { PipecatClient, RTVIEvent, WebSocketTransport } = window;

    let isConnected = false;
    let pipecatClient = null;
    const audioElement = document.getElementById('audioOutput');

    const callButton = document.getElementById('callButton');
    const buttonText = document.getElementById('buttonText');
    const micIcon = document.getElementById('micIcon');
    const phoneIcon = document.getElementById('phoneIcon');
    const transcriptText = document.getElementById('transcriptText');
    const statusBadge = document.getElementById('statusBadge');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const coreCircle = document.getElementById('coreCircle');
    const ripple1 = document.getElementById('ripple1');
    const ripple2 = document.getElementById('ripple2');
    const bars = ['bar1','bar2','bar3','bar4','bar5'].map(id => document.getElementById(id));
    const errorMessage = document.getElementById('errorMessage');

    function applyBranding() {
      const root = document.documentElement;
      root.style.setProperty('--primary-color', CONFIG.PRIMARY_COLOR);
      root.style.setProperty('--accent-color', CONFIG.ACCENT_COLOR);
      root.style.setProperty('--accent-color-hover', CONFIG.ACCENT_COLOR_HOVER);
      root.style.setProperty('--end-button-color', CONFIG.END_BUTTON_COLOR);
      root.style.setProperty('--end-button-hover', CONFIG.END_BUTTON_HOVER);
      root.style.setProperty('--text-color', CONFIG.TEXT_COLOR);
      root.style.setProperty('--subtitle-color', CONFIG.SUBTITLE_COLOR);
      root.style.setProperty('--success-color', CONFIG.SUCCESS_COLOR);
      document.title = CONFIG.PAGE_TITLE;
      document.querySelector('.title').textContent = CONFIG.TITLE;
      document.querySelector('.subtitle').textContent = CONFIG.SUBTITLE;
      buttonText.textContent = CONFIG.START_BUTTON_TEXT;
      statusText.textContent = CONFIG.STATUS_READY;
      transcriptText.textContent = CONFIG.GREETING_TEXT;
    }

    applyBranding();

    function updateUI(connected) {
      isConnected = connected;
      if (connected) {
        callButton.className = 'call-button end';
        buttonText.textContent = CONFIG.END_BUTTON_TEXT;
        micIcon.style.display = 'none';
        phoneIcon.style.display = 'block';
        statusBadge.className = 'status-badge connected';
        statusDot.className = 'status-dot connected';
        statusText.textContent = CONFIG.STATUS_CONNECTED;
        coreCircle.classList.add('active');
        ripple1.classList.add('active');
        ripple2.classList.add('active');
        bars.forEach(bar => bar.classList.add('active'));
      } else {
        callButton.className = 'call-button start';
        buttonText.textContent = CONFIG.START_BUTTON_TEXT;
        micIcon.style.display = 'block';
        phoneIcon.style.display = 'none';
        statusBadge.className = 'status-badge disconnected';
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = CONFIG.STATUS_READY;
        coreCircle.classList.remove('active');
        ripple1.classList.remove('active');
        ripple2.classList.remove('active');
        bars.forEach(bar => bar.classList.remove('active'));
      }
    }

    function setTranscript(text) { transcriptText.textContent = text; }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      setTimeout(() => { errorMessage.style.display = 'none'; }, 5000);
    }

    async function connect() {
      try {
        errorMessage.style.display = 'none';
        const config = {
          transport: new WebSocketTransport(),
          enableMic: true,
          enableCam: false,
          callbacks: {
            onConnected: () => { updateUI(true); setTranscript(CONFIG.CONNECTED_TEXT); },
            onDisconnected: () => { updateUI(false); setTranscript(CONFIG.DISCONNECTED_TEXT); },
            onBotReady: () => { setTranscript(CONFIG.AGENT_READY_TEXT); },
            onUserTranscript: (data) => { if (data.final) setTranscript(`You: ${data.text}`); },
            onBotTranscript: (data) => { setTranscript(`Agent: ${data.text}`); },
            onError: (err) => { showError(err?.message || "Unknown error"); }
          }
        };
        const client = new PipecatClient(config);
        pipecatClient = client;
        client.on(RTVIEvent.TrackStarted, (track, participant) => {
          if (!participant?.local && track.kind === "audio" && audioElement) {
            audioElement.srcObject = new MediaStream([track]);
          }
        });
        setTranscript("Initializing devices...");
        await client.initDevices();
        setTranscript(CONFIG.CONNECTING_TEXT);
        const response = await fetch(`${CONFIG.BACKEND_URL}/frontend/connect`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ assistant_id: CONFIG.ASSISTANT_ID })
        });
        if (!response.ok) throw new Error(`Failed to get WebSocket URL: ${response.status}`);
        const { ws_url } = await response.json();
        await client.connect({ wsUrl: ws_url });
      } catch (err) {
        showError(err.message || "Connection failed");
        updateUI(false);
        setTranscript(CONFIG.CONNECTION_FAILED_TEXT);
      }
    }

    async function disconnect() {
      if (pipecatClient) {
        try { await pipecatClient.disconnect(); } catch (e) {}
        pipecatClient = null;
        updateUI(false);
      }
    }

    async function toggleCall() {
      if (isConnected) await disconnect();
      else await connect();
    }

    window.addEventListener('beforeunload', () => {
      if (pipecatClient) pipecatClient.disconnect().catch(console.error);
    });
  </script>
</body>

</html>
